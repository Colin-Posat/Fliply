<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/FliplyPNGs/fliply_logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fliply - AI Flashcards</title>
    <link rel="stylesheet" href="../../css/css_login_signup/index.css" />
  </head>
  <body>
    <header class="top-bar">
      <span class="contact">Contact Us</span>
    </header>

    <main>
      <div class="content">
        <div class="logo-container">
          <h1>Fliply</h1>
          <img
            src="../../FliplyPNGs/fliply_logo.png"
            alt="Fliply Logo"
            class="logo"
          />
        </div>
        <p class="subtitle">
          The <strong>FREE</strong> AI-powered flashcard generator and sharing
          platform that will
          <span class="save-grade"><a href="#">save your grade</a></span>
        </p>
        <div class="buttons">
          <button
            class="login"
            onclick="window.location.href='/html/login_signup/login.html';"
          >
            Login
          </button>

          <span class="or">Or</span>

          <button
            class="signup"
            onclick="window.location.href='/html/login_signup/signup.html';"
          >
            Sign Up
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
