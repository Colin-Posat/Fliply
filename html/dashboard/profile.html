<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preload" href="../../css/dashboard/profile.css" as="style" />
    <link rel="stylesheet" href="../../css/dashboard/profile.css" />
    <link rel="icon" type="image/png" href="../../FliplyPNGs/fliply_logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Fliply</title>
    <link rel="stylesheet" href="../../css/dashboard/profile.css" />
    <link rel="stylesheet" href="../../css/nav_bar.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="top-nav">
      <a href="created_sets.html" class="nav-item">
        <img src="../../FliplyPNGs/my sets icon.png" alt="Created Sets Icon" />
        Created Sets
      </a>
      <a href="saved_sets.html" class="nav-item">
        <img src="../../FliplyPNGs/saved sets icon.png" alt="Saved Sets Icon" />
        <link rel="stylesheet" href="../../css/nav_bar.css" />
        Saved Sets
      </a>
      <a href="search_sets.html" class="nav-item">
        <img
          src="../../FliplyPNGs/search sets icon.png"
          alt="Search Sets Icon"
        />
        Search Sets
      </a>
      <a href="profile.html" class="nav-item active">
        <img src="../../FliplyPNGs/your profile icon.png" alt="Profile Icon" />
        Profile
      </a>
    </nav>

    <!-- Profile Container -->
    <div class="profile-container">
      <div class="profile-header">
        <img
          src="../../FliplyPNGs/default fliply profile.png"
          alt="Profile Picture"
          class="profile-pic"
        />
        <div class="profile-info">
          <h2 id="profile-username">
              Loading... <span class="likes">❤️ <strong id="profile-likes">0</strong></span>
          </h2>
          <p id="profile-university">Loading...</p>
          <p id="profile-fieldOfStudy">Loading...</p>
      </div>
      
      <div class="profile-buttons">
        <button class="edit-btn">Edit Profile</button>
        <button class="signout-btn" id="signout-btn">
          Sign Out
        </button>
      </div>
    </div>
  </body>
  <script type="module" src="../../js/dashboard/profile.js" defer></script>
</html>
