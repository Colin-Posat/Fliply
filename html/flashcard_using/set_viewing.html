<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="../../FliplyPNGs/fliply_logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard Set - Fliply</title>
    <link rel="stylesheet" href="../../css/set_creation/set_creator.css" />
    <link rel="stylesheet" href="../../css/flashcard_using/set_viewing.css" />
    <link rel="stylesheet" href="../../css/nav_bar.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="top-nav">
      <a href="../dashboard/created_sets.html" class="nav-item back-button">
        <img src="../../FliplyPNGs/back button.png" alt="Back Icon" />
      </a>
      <a href="../dashboard/created_sets.html" class="nav-item active">
        <img src="../../FliplyPNGs/my sets icon.png" alt="Created Sets Icon" />
        Created Sets
      </a>
      <a href="../dashboard/saved_sets.html" class="nav-item">
        <img src="../../FliplyPNGs/saved sets icon.png" alt="Saved Sets Icon" />
        Saved Sets
      </a>
      <a href="../dashboard/search_sets.html" class="nav-item">
        <img
          src="../../FliplyPNGs/search sets icon.png"
          alt="Search Sets Icon"
        />
        Search Sets
      </a>
      <a href="../dashboard/profile.html" class="nav-item">
        <img src="../../FliplyPNGs/your profile icon.png" alt="Profile Icon" />
        Profile
      </a>
    </nav>

    <!-- Set Title and Class Code -->
    <div class="set-header">
      <div class="set-title-container">
        <h1 class="set-title"></h1>
        <span class="class-code"></span>
      </div>
      <button class="edit-set-btn">
        <img src="../../FliplyPNGs/edit icon.png" />
        Edit Set
      </button>
    </div>

    <!-- View Modes -->
    <div class="view-mode-container">
      <button class="view-mode-flash">View as Flashcards</button>
      <button class="view-mode-quiz">View as Quiz</button>
    </div>

    <!-- Flashcard List -->
    <div class="flashcard-container" id="flashcard-list">
      <div class="flashcard">
        <span class="card-number">1</span>
        <div class="flashcard-content">
          <div class="question-container">
            <label>Question:</label>
            <div class="question-text">
              What is considered the official powerhouse of a cell?
            </div>
          </div>
          <div class="answer-container">
            <label>Answer:</label>
            <div class="answer-text">The Mitochondria of course!</div>
          </div>
        </div>
      </div>

      <div class="flashcard">
        <span class="card-number">2</span>
        <div class="flashcard-content">
          <div class="question-container">
            <label>Question:</label>
            <div class="question-text"></div>
          </div>
          <div class="answer-container">
            <label>Answer:</label>
            <div class="answer-text"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script type="module" src="../../js/set_viewing.js"></script>
</html>
