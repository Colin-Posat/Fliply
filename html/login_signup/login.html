<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="../../FliplyPNGs/fliply_logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Fliply</title>
    <link rel="stylesheet" href="../../css/css_login_signup/login.css" />
  </head>
  <body class="login-page">
    <div class="login-container">
      <img
        src="../../FliplyPNGs/fliply_logo.png"
        alt="Fliply Logo"
        class="logo"
      />
      <h1>SlugShare</h1>

      <canvas id="particles"></canvas>

      <form id="login-form">
        <input type="email" placeholder="Email" id="login-email" required />
        <input
          type="password"
          placeholder="Password"
          id="login-password"
          required
        />
        <a href="#" class="forgot-password">Forgot password?</a>
        <button type="submit" class="login-btn" id="login-btn">Login</button>
      </form>

      <p>New user? <a href="signup.html">Create Account</a></p>
    </div>
  </body>
  <script type="module" src="../../js/login/login.js" defer></script>
</html>
