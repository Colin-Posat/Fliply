<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="FliplyPNGs/fliply_logo.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Details - Fliply</title>
    <link rel="stylesheet" href="../../css/css_login_signup/details.css" />
  </head>
  <body class="details-page">
    <div class="details-container">
      <h1>Just a Few More Details!</h1>

      <form id="details-form">
        <input
          type="text"
          placeholder="Select Your University"
          id="university"
          required
        />
        <input
          type="text"
          placeholder="Enter Your Field of Study (Optional)"
          id="fieldOfStudy"
        />
        <button type="submit" class="details-btn" id="submit-details">
          Done
        </button>
      </form>

      <img
        src="../../FliplyPNGs/fliply_logo.png"
        alt="Fliply Logo"
        class="logo"
      />
    </div>
  </body>
  <script type="module" src="../../js/signup/details.js" defer></script>
</html>
